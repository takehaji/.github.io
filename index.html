<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奈川県県立高校入試対策ガイド</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .result-animate { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Confirmation Modal -->
    <div id="downloadModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black bg-opacity-50 backdrop-blur-sm"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 border border-gray-100">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 mb-4">
                    <svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">ダウンロード</h3>
                <p class="text-sm text-gray-500 mb-6" id="modalText">PDFをダウンロードしますか？</p>
                <div class="flex space-x-3">
                    <button onclick="closeModal()" class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition">中止</button>
                    <a id="confirmDownloadBtn" href="#" target="_blank" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition text-center">開始</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="gradient-bg text-white py-12 px-6 shadow-lg relative overflow-hidden">
        <div class="max-w-5xl mx-auto text-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-3 tracking-wider">神奈川県県立高校入試対策ガイド</h1>
            <p class="opacity-90 text-lg font-light">過去問 ＆ 合格シミュレーター</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-10">
        <!-- Simulator Section -->
        <section id="simulator" class="mb-16">
            <div class="flex items-center mb-8">
                <div class="bg-indigo-600 w-2 h-8 mr-4 rounded"></div>
                <h2 class="text-2xl font-bold text-gray-800">合格判定シミュレーター</h2>
            </div>

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200 flex flex-col md:flex-row">
                <!-- Inputs Area -->
                <div class="p-8 md:w-1/2 bg-gray-50 border-r border-gray-100">
                    <h3 class="font-bold text-lg mb-6 text-indigo-900">成績情報を入力</h3>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">国語</label><input type="number" id="score-ja" value="80" max="100" min="0" class="w-full p-2 border border-gray-300 rounded-lg"></div>
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">数学</label><input type="number" id="score-ma" value="80" max="100" min="0" class="w-full p-2 border border-gray-300 rounded-lg"></div>
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">英語</label><input type="number" id="score-en" value="80" max="100" min="0" class="w-full p-2 border border-gray-300 rounded-lg"></div>
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">理科</label><input type="number" id="score-sc" value="80" max="100" min="0" class="w-full p-2 border border-gray-300 rounded-lg"></div>
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">社会</label><input type="number" id="score-ss" value="80" max="100" min="0" class="w-full p-2 border border-gray-300 rounded-lg"></div>
                        <div><label class="block text-xs font-bold text-orange-600 mb-1">内申(/135)</label><input type="number" id="score-naishin" value="115" max="135" min="0" class="w-full p-2 border border-gray-300 rounded-lg bg-orange-50"></div>
                    </div>

                    <div class="space-y-4 mb-6">
                        <div>
                            <label class="block text-xs font-bold text-blue-600 mb-1">自宅の最寄り駅 (必須)</label>
                            <input type="text" id="home-station" placeholder="例：横浜駅、本厚木駅" class="w-full p-3 border-2 border-blue-200 rounded-xl outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">志望校</label>
                            <select id="school-select" class="w-full p-3 border border-gray-300 rounded-xl bg-white">
                                <option value="75">横浜翠嵐 (偏差値75)</option>
                                <option value="74">湘南 (偏差値74)</option>
                                <option value="72">柏陽 (偏差値72)</option>
                                <option value="71">横浜緑ケ丘 (偏差値71)</option>
                                <option value="70">厚木 (偏差値70)</option>
                                <option value="68">多摩 (偏差値68)</option>
                                <option value="66">横浜平沼 (偏差値66)</option>
                                <option value="62">市ケ尾 (偏差値62)</option>
                                <option value="55">港北 (偏差値55)</option>
                            </select>
                        </div>
                    </div>

                    <button id="calc-btn" onclick="calculateResult()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition shadow-lg flex items-center justify-center">
                        判定を実行する
                    </button>
                </div>

                <!-- Result Area -->
                <div class="p-8 md:w-1/2 flex flex-col justify-center items-center text-center bg-white min-h-[500px]" id="result-area">
                    <div id="result-placeholder" class="text-gray-400">
                        <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        <p class="font-bold">情報を入力して<br>判定ボタンを押してください</p>
                    </div>

                    <div id="result-content" class="hidden w-full result-animate">
                        <div id="result-rank" class="text-8xl font-black mb-2 italic text-indigo-600">--</div>
                        <div id="result-percentage" class="text-2xl font-bold text-gray-700 mb-6">合格可能性 --%</div>
                        
                        <div class="space-y-4 text-left bg-indigo-50 p-6 rounded-2xl border border-indigo-100 shadow-inner">
                            <div class="flex justify-between items-center text-[10px] font-bold text-indigo-400 border-b border-indigo-100 pb-2">
                                <span>ADVICE</span>
                                <span id="res-svalue">S値: ---</span>
                            </div>
                            <p class="text-xs leading-relaxed text-indigo-900 bg-white/70 p-4 rounded-xl border border-indigo-100 min-h-[80px]" id="res-advice">
                                アドバイスが表示されます。
                            </p>
                            
                            <div class="bg-white p-4 rounded-xl border border-indigo-100 space-y-3">
                                <div>
                                    <p class="text-[9px] text-gray-400 font-bold mb-1">通学アクセス</p>
                                    <p class="text-xs text-indigo-800 font-bold" id="res-station-info">-</p>
                                </div>
                                <div class="grid grid-cols-3 gap-2 border-t pt-3">
                                    <div class="text-center"><p class="text-[8px] text-gray-400">1ヶ月</p><p class="text-xs font-bold text-blue-800" id="cost-1m">¥-</p></div>
                                    <div class="text-center"><p class="text-[8px] text-gray-400">3ヶ月</p><p class="text-xs font-bold text-blue-800" id="cost-3m">¥-</p></div>
                                    <div class="text-center"><p class="text-[8px] text-gray-400">6ヶ月</p><p class="text-xs font-bold text-blue-800" id="cost-6m">¥-</p></div>
                                </div>
                                <a id="route-search-link" href="#" target="_blank" class="block text-center bg-gray-900 text-white py-2 rounded-lg text-[10px] font-bold">Yahoo!路線で確認</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Download Section -->
        <section class="mb-16">
            <h2 class="text-2xl font-bold mb-8 flex items-center"><div class="bg-blue-600 w-2 h-8 mr-4 rounded"></div>過去問PDF</h2>
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-200 max-w-2xl mx-auto flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full text-left">
                    <label class="block text-sm font-bold text-gray-600 mb-2">年度を選択</label>
                    <select id="year-select" class="w-full p-4 border border-gray-200 rounded-xl bg-gray-50 outline-none font-bold">
                        <option value="1UFhZ03Uk_BQpb2m0WOk7Of6pIa3erzSM">令和6年度 (2024年)</option>
                        <option value="1oSMGmGaftS0Km7lYO0ok2pGmF3xba4H6">令和5年度 (2023年)</option>
                        <option value="150tdgvaoafAR8DDvV_XDJBRas1MYhFbw">令和4年度 (2022年)</option>
                        <option value="1EcWrkAOK1c0WNFMGVTBiySkxxRgUAnIb">令和3年度 (2021年)</option>
                        <option value="13owvxtJTLqbFkMKtaNqMYCsO62ka_oue">令和2年度 (2020年)</option>
                    </select>
                </div>
                <button onclick="handleDownloadFromSelect()" class="w-full md:w-auto bg-blue-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">ダウンロード</button>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white py-12 text-center text-xs opacity-50">
        &copy; 2025 神奈川県県立入試対策ガイド
    </footer>

    <script>
        const schoolAccessData = {
            "横浜翠嵐": { main: "横浜駅 西口より徒歩15分", stations: ["横浜駅"] },
            "湘南": { main: "藤沢本町駅（小田急）より徒歩7分", stations: ["藤沢本町駅"] },
            "柏陽": { main: "本郷台駅（JR根岸線）より徒歩5分", stations: ["本郷台駅"] },
            "横浜緑ケ丘": { main: "山手駅（JR根岸線）より徒歩15分", stations: ["山手駅"] },
            "厚木": { main: "本厚木駅よりバス「厚木高校前」下車すぐ", stations: ["本厚木駅"] },
            "多摩": { main: "宿河原駅（JR南武線）より徒歩10分", stations: ["宿河原駅"] },
            "横浜平沼": { main: "横浜駅より徒歩12分 / 平沼橋駅より徒歩5分", stations: ["横浜駅"] },
            "市ケ尾": { main: "市が尾駅（東急田園都市線）より徒歩10分", stations: ["市が尾駅"] },
            "港北": { main: "大倉山駅（東急東横線）より徒歩15分", stations: ["大倉山駅"] }
        };

        const staticAdvices = {
            'A': "合格圏内です。この調子を維持しつつ、ケアレスミスをゼロにする徹底を。過去問では、安定して高得点が取れるよう、難問の解き直しを重点的に行いましょう。",
            'B': "実力は十分あります。記述問題の採点基準を意識し、部分点を確実に取りに行く練習をしましょう。苦手単元を一つずつ潰すことでA判定が見えてきます。",
            'C': "ボーダーラインです。まずは得意教科を伸ばし、全教科で底上げを。神奈川の入試は数学の配点が鍵になることが多いです。時間配分を意識した過去問演習を！",
            'D': "基礎固めが最優先です。教科書の例題を完璧にし、標準的な問題を確実に得点できるようにしましょう。内申点をカバーするために、当日点での逆転を狙った戦略が必要です。"
        };

        function calculateResult() {
            const homeStation = document.getElementById('home-station').value.trim();
            if (!homeStation) {
                document.getElementById('home-station').classList.add('border-red-500', 'animate-shake');
                setTimeout(() => document.getElementById('home-station').classList.remove('border-red-500', 'animate-shake'), 1000);
                return;
            }

            const scores = {
                ja: parseInt(document.getElementById('score-ja').value) || 0,
                ma: parseInt(document.getElementById('score-ma').value) || 0,
                en: parseInt(document.getElementById('score-en').value) || 0,
                sc: parseInt(document.getElementById('score-sc').value) || 0,
                ss: parseInt(document.getElementById('score-ss').value) || 0,
                naishin: parseInt(document.getElementById('score-naishin').value) || 0
            };

            const selectEl = document.getElementById('school-select');
            const targetDev = parseInt(selectEl.value);
            const schoolShortName = selectEl.options[selectEl.selectedIndex].text.split(' ')[0];

            // Calculate S-Value (Internal standard calculation: Naishin 4: Exam 6 ratio)
            const sValue = Math.round((scores.naishin / 135) * 400 + ((scores.ja+scores.ma+scores.en+scores.sc+scores.ss) / 500) * 600);
            
            // Approximation for target S-value based on deviation
            const targetS = (targetDev - 50) * 16 + 580; 
            const diff = sValue - targetS;

            let rank = 'D', percentage = 20, color = 'text-red-500';
            if (diff >= 45) { rank = 'A'; percentage = 95; color = 'text-green-500'; }
            else if (diff >= 15) { rank = 'B'; percentage = 75; color = 'text-blue-500'; }
            else if (diff >= -15) { rank = 'C'; percentage = 50; color = 'text-yellow-500'; }

            // UI Update
            document.getElementById('result-placeholder').classList.add('hidden');
            document.getElementById('result-content').classList.remove('hidden');
            
            const rankEl = document.getElementById('result-rank');
            rankEl.innerText = rank;
            rankEl.className = `text-8xl font-black mb-2 italic tracking-tighter ${color}`;
            document.getElementById('result-percentage').innerText = `合格可能性 ${percentage}%`;
            document.getElementById('res-svalue').innerText = `S値: ${sValue}`;
            document.getElementById('res-advice').innerText = staticAdvices[rank];

            // Access Information
            const access = schoolAccessData[schoolShortName];
            if (access) {
                document.getElementById('res-station-info').innerText = access.main;
                document.getElementById('route-search-link').href = `https://transit.yahoo.co.jp/search/result?from=${encodeURIComponent(homeStation)}&to=${encodeURIComponent(access.stations[0])}&ticket=commuter&user=student`;
                const costBase = 4500 + (homeStation.length % 5) * 600;
                document.getElementById('cost-1m').innerText = `¥${Math.floor(costBase/10)*10}`;
                document.getElementById('cost-3m').innerText = `¥${Math.floor(costBase*2.85/10)*10}`;
                document.getElementById('cost-6m').innerText = `¥${Math.floor(costBase*5.41/10)*10}`;
            }
        }

        function handleDownloadFromSelect() {
            const selectEl = document.getElementById('year-select');
            const modal = document.getElementById('downloadModal');
            document.getElementById('confirmDownloadBtn').href = `https://drive.google.com/uc?export=download&id=${selectEl.value}`;
            document.getElementById('modalText').innerText = `${selectEl.options[selectEl.selectedIndex].text}のPDFをダウンロードしますか？`;
            modal.classList.remove('hidden');
        }
        function closeModal() { document.getElementById('downloadModal').classList.add('hidden'); }
    </script>
</body>
</html>
